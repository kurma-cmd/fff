name: Verify university sources

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  verify-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run verify:universities
